<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <th:block th:replace="~{/common/fragment :: common}"></th:block>
    <link rel="stylesheet" th:href="@{/css/member/join.css}">
</head>
<body>

    <main class="join-wrapper">

        <!-- 로고 -->
        <div class="logo-area">
            <a th:href="@{/}">
                <img th:src="@{/img/main-logo.png}" alt="TreeLink 로고" width="240" height="80" loading="eager">
            </a>
        </div>

        <!-- 회원가입 카드 -->
        <div class="join-card">
            <div class="join-card__header">
                <div class="join-card__icon">
                    <i data-lucide="user-plus"></i>
                </div>
                <h1 class="join-card__title">회원가입</h1>
                <p class="join-card__desc">TreeLink에 오신 것을 환영합니다</p>
            </div>

            <form th:action="@{/member/join}" th:object="${memberJoin}" method="post" id="joinForm" novalidate>

                <!-- ① 아이디 -->
                <div class="form-group" id="group-userId">
                    <label class="form-label" for="userId">
                        <i data-lucide="at-sign"></i>
                        아이디
                    </label>
                    <div class="input-row">
                        <input
                            type="text"
                            id="userId"
                            th:field="*{userId}"
                            class="form-input"
                            placeholder="영문·숫자 4~12자"
                            autocomplete="username"
                            maxlength="12"
                            required>
                        <button type="button" class="btn-check" id="btn-check-id" aria-label="아이디 중복 확인">
                            중복 확인
                        </button>
                    </div>
                    <span class="form-feedback" id="feedback-userId" aria-live="polite"></span>
                </div>

                <!-- ② 비밀번호 -->
                <div class="form-group" id="group-userPwd">
                    <label class="form-label" for="userPwd">
                        <i data-lucide="lock"></i>
                        비밀번호
                    </label>
                    <div class="input-row input-row--single">
                        <input
                            type="password"
                            id="userPwd"
                            th:field="*{userPwd}"
                            class="form-input"
                            placeholder="영문·숫자·특수문자(@$!%*#?&) 4~20자"
                            autocomplete="new-password"
                            maxlength="20"
                            required>
                        <button type="button" class="btn-eye" id="btn-eye-pwd" aria-label="비밀번호 표시/숨기기">
                            <i data-lucide="eye"></i>
                        </button>
                    </div>
                    <span class="form-feedback" id="feedback-userPwd" aria-live="polite"></span>
                </div>

                <!-- ③ 이름 -->
                <div class="form-group" id="group-name">
                    <label class="form-label" for="name">
                        <i data-lucide="user"></i>
                        이름
                    </label>
                    <input
                        type="text"
                        id="name"
                        th:field="*{name}"
                        class="form-input"
                        placeholder="한글·영문·숫자 1~10자"
                        maxlength="10"
                        required>
                    <span class="form-feedback" id="feedback-name" aria-live="polite"></span>
                </div>

                <!-- ④ 닉네임 -->
                <div class="form-group" id="group-nickname">
                    <label class="form-label" for="nickname">
                        <i data-lucide="smile"></i>
                        닉네임
                    </label>
                    <div class="input-row">
                        <input
                            type="text"
                            id="nickname"
                            th:field="*{nickname}"
                            class="form-input"
                            placeholder="한글·영문·숫자 1~10자"
                            maxlength="10"
                            required>
                        <button type="button" class="btn-check" id="btn-check-nickname" aria-label="닉네임 중복 확인">
                            중복 확인
                        </button>
                    </div>
                    <span class="form-feedback" id="feedback-nickname" aria-live="polite"></span>
                </div>

                <!-- 제출 버튼 -->
                <button type="submit" class="btn-submit" id="btn-submit">
                    <i data-lucide="user-check"></i>
                    가입하기
                </button>

            </form>

            <p class="join-card__login-link">
                이미 계정이 있으신가요?
                <a th:href="@{/member/login}">로그인</a>
            </p>
        </div>

    </main>

    <script th:src="@{/js/member/join.js}"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
