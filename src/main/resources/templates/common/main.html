<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TreeLink</title>
    <th:block th:replace="~{/common/fragment :: common}"></th:block>
    <link rel="stylesheet" th:href="@{/css/common/main.css}">
</head>
<body>
    <main class="main-wrapper">

        <!-- 1. 로고 -->
        <div class="logo-area">
            <img th:src="@{/img/main-logo.png}" alt="TreeLink 로고" width="360" height="120" loading="eager">
        </div>

        <!-- 2. 메뉴 카드 영역 -->
        <div class="card-row"
            th:classappend="${#authorization.expression('hasRole(''ADMIN'')') or #authorization.expression('hasRole(''EVALUATOR'')') ? 'card-row--three' : ''}">

            <!-- 업체 조회 카드 -->
            <a th:href="@{/company/list}" class="menu-card" role="link" aria-label="업체 조회하기">
                <div class="card-icon">
                    <i data-lucide="building-2"></i>
                </div>
                <span class="card-label">업체 조회하기</span>
            </a>

            <!-- 관리자 카드 (ADMIN 권한) -->
            <div sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/admin/main}" class="menu-card" role="link" aria-label="관리자 페이지">
                    <div class="card-icon card-icon--admin">
                        <i data-lucide="shield-check"></i>
                    </div>
                    <span class="card-label">관리자 페이지</span>
                </a>
            </div>

            <!-- 평가자 카드 (EVALUATOR 권한) -->
            <div sec:authorize="hasRole('EVALUATOR')">
                <a th:href="@{/evaluator/main}" class="menu-card" role="link" aria-label="평가자 페이지">
                    <div class="card-icon card-icon--evaluator">
                        <i data-lucide="clipboard-check"></i>
                    </div>
                    <span class="card-label">평가자 페이지</span>
                </a>
            </div>

            <!-- 로그인 상태: 회원 정보 카드 -->
            <div th:if="${#authorization.expression('isAuthenticated()')}"
                 class="menu-card menu-card--static"
                 role="region"
                 aria-label="내 정보 및 로그아웃">
                <div class="card-icon">
                    <i data-lucide="circle-user-round"></i>
                </div>
                <span class="card-label" th:text="${#authentication.principal.name}">홍길동</span>
                <div class="btn-group">
                    <a th:href="@{/member/detail}" class="btn btn-primary">내 정보</a>
                    <!-- 로그아웃: POST 전송 (Spring Security CSRF 포함) -->
                    <form th:action="@{/member/logout}" method="post" style="width:100%;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-outline" style="width:100%;">로그아웃</button>
                    </form>
                </div>
            </div>

            <!-- 비로그인 상태: 로그인 / 회원가입 카드 -->
            <div th:if="${!#authorization.expression('isAuthenticated()')}"
                 class="menu-card menu-card--static"
                 role="region"
                 aria-label="로그인 또는 회원가입">
                <div class="card-icon">
                    <i data-lucide="key-round"></i>
                </div>
                <div class="btn-group">
                    <a th:href="@{/member/login}" class="btn btn-primary">로그인</a>
                    <a th:href="@{/member/join}" class="btn btn-outline">회원가입</a>
                </div>
            </div>

        </div><!-- /.card-row -->
    </main>

    <script>
        lucide.createIcons();
    </script>
    <script th:src="@{/js/common/main.js}"></script>
</body>

</html>
