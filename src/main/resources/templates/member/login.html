<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <th:block th:replace="~{/common/fragment :: library}"></th:block>
    <link rel="stylesheet" th:href="@{/css/member/login.css}">
</head>
<body>

    <main class="login-wrapper">

        <!-- 로고 -->
        <div class="logo-area">
            <a th:href="@{/}">
                <img th:src="@{/img/main-logo.png}" alt="TreeLink 로고" width="360" height="120" loading="eager">
            </a>
        </div>

        <!-- 로그인 카드 -->
        <div class="login-card">

            <!-- 로그인 실패 알림 (error=true 파라미터 존재 시 노출) -->
            <div class="alert-error" th:if="${param.error}">
                <i data-lucide="circle-alert"></i>
                <span>아이디 또는 비밀번호가 올바르지 않습니다.</span>
            </div>

            <form th:action="@{/member/login-proc}" method="post" id="loginForm" novalidate>

                <!-- 아이디 -->
                <div class="field-group" id="group-userId">
                    <label for="userId" class="field-label">아이디</label>
                    <div class="input-wrap">
                        <i data-lucide="user" class="input-icon"></i>
                        <input
                            type="text"
                            id="userId"
                            name="userId"
                            class="field-input"
                            placeholder="영문·숫자 4~12자"
                            autocomplete="username"
                            maxlength="12"
                        >
                    </div>
                    <span class="field-msg" id="msg-userId"></span>
                </div>

                <!-- 비밀번호 -->
                <div class="field-group" id="group-userPwd">
                    <label for="userPwd" class="field-label">비밀번호</label>
                    <div class="input-wrap">
                        <i data-lucide="lock" class="input-icon"></i>
                        <input
                            type="password"
                            id="userPwd"
                            name="userPwd"
                            class="field-input"
                            placeholder="영문·숫자·특수문자 포함 4~20자"
                            autocomplete="current-password"
                            maxlength="20"
                        >
                        <button type="button" class="toggle-pwd" id="togglePwd" aria-label="비밀번호 표시/숨기기">
                            <i data-lucide="eye" id="eyeIcon"></i>
                        </button>
                    </div>
                    <span class="field-msg" id="msg-userPwd"></span>
                </div>

                <!-- 로그인 버튼 -->
                <button type="submit" class="btn-login" id="btnLogin">
                    로그인
                </button>

            </form>
        </div><!-- /.login-card -->

    </main>

    <script>
        lucide.createIcons();
    </script>
    <script th:src="@{/js/member/login.js}"></script>
</body>
</html>
